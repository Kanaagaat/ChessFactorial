<main class="app-shell">
  <header class="topbar">
    <a class="brand" routerLink="/play">Tactical Scholar</a>
    <nav class="links">
      <a routerLink="/play" routerLinkActive="active">Play</a>
      <a routerLink="/history" routerLinkActive="active">History</a>
      <a routerLink="/auth" routerLinkActive="active" *ngIf="!auth.isAuthenticated()">Login</a>
      <button class="ghost" *ngIf="auth.isAuthenticated()" (click)="auth.logout()">Logout</button>
    </nav>
  </header>
  <router-outlet />
</main>
